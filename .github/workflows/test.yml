name: CI/CD Tests

on:
  push:
    branches: [ main, develop, test ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'
          cache: true

      - name: Run gofmt
        run: |
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "Go code is not formatted"
            gofmt -s -d .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: coffee_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: coffee_db

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'
          cache: true

      - name: Build application
        run: go build -v -o coffee ./cmd/main.go

      - name: Verify binary
        run: |
          if [ ! -f coffee ]; then
            echo "Build failed: binary not created"
            exit 1
          fi
          file coffee

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: coffee-binary
          path: coffee
          retention-days: 5

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: coffee:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt json -out gosec-report.json ./...'

      - name: Upload Gosec report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gosec-report
          path: gosec-report.json

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: coffee-binary

      - name: Make binary executable
        run: chmod +x coffee

      - name: Start application
        run: ./coffee &
        env:
          PORT: "8080"

      - name: Wait for service to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8080/menu 2>/dev/null; then
              echo "Service is ready"
              exit 0
            fi
            echo "Waiting for service... ($i/30)"
            sleep 1
          done
          echo "Service did not start in time"
          exit 1

      - name: Test API endpoints
        run: |
          echo "Testing GET /menu"
          curl -X GET http://localhost:8080/menu -w "\nHTTP Status: %{http_code}\n"
          
          echo "Testing GET /orders"
          curl -X GET http://localhost:8080/orders -w "\nHTTP Status: %{http_code}\n"
          
          echo "Testing GET /inventory"
          curl -X GET http://localhost:8080/inventory -w "\nHTTP Status: %{http_code}\n"

  results:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build, docker-build, security-scan]
    if: always()
    steps:
      - name: All tests passed
        if: needs.lint.result == 'success' && needs.test.result == 'success' && needs.build.result == 'success' && needs.docker-build.result == 'success' && needs.security-scan.result == 'success'
        run: echo "All CI/CD checks passed!"

      - name: Some tests failed
        if: failure()
        run: |
          echo "Some CI/CD checks failed!"
          exit 1
